<style>
:root{
  --teal:#C6931E;--teal-d:#9C7014;--teal-l:#F6E8C6;--teal-xl:#FBF3E0;
  --sidebar:#251C13;--sidebar-hover:#352A1B;--sidebar-active:#D9A02A;
  --bg:#FAF5EA;--card:#FFFDF8;--text:#332615;--muted:#8A7457;
  --border:#E9DEC3;--shadow:0 1px 4px rgba(60,40,10,.08);--shadow-md:0 6px 22px rgba(60,40,10,.14);
  --green:#6C8F49;--orange:#D97B1F;--red:#BB3E10;--blue:#4A72A8;--purple:#8B5FA3;
  --radius:8px;--sidebar-w:220px;
  --sunrise:linear-gradient(90deg,#8B3A0E 0%,#E8720C 35%,#F2A93C 68%,#F6CE6E 100%);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
h1,h2,h3,.login-title,.sidebar-logo-text,.topbar-title,.page-title,.kpi-val,.ticket-subject-lg,.fw-modal-title,.dropdown-head,.props-head,.fw-card-title,.ticket-props .props-head{font-family:'Fraunces',Georgia,serif;}

/* ── LOGIN ── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 30%,#4a2f12 0%,#2a1a0c 55%,#1a1108 100%);position:relative;overflow:hidden;}
#login-screen::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:var(--sunrise);}
.login-card{background:var(--card);border-radius:16px;padding:44px 40px 40px;width:420px;box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center;position:relative;z-index:1;}
.login-logo{width:88px;height:88px;margin:0 auto 18px;}
.login-logo img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 4px 10px rgba(180,110,20,.35));}
.login-title{font-size:22px;font-weight:700;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:32px;}
.ms-sign-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:12px;padding:13px 20px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--text);}
.ms-sign-btn:hover{border-color:var(--teal);box-shadow:var(--shadow-md);background:var(--teal-xl);}
.ms-icon{width:20px;height:20px;flex-shrink:0;}
.or-line{display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--muted);font-size:12px;}
.or-line::before,.or-line::after{content:'';flex:1;border-top:1px solid var(--border);}
.fw-input{width:100%;border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 13px;font-size:14px;font-family:inherit;color:var(--text);transition:border-color .15s;}
.fw-input:focus{outline:none;border-color:var(--teal);}
.fw-label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
.login-err{color:var(--red);font-size:12px;margin-top:10px;display:none;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit;}
.btn-teal{background:linear-gradient(180deg,#E0AC3E 0%,#C6931E 100%);color:#2A1D0C;}.btn-teal:hover{background:linear-gradient(180deg,#D9A02A 0%,#B3820E 100%);}
.btn-ghost{background:transparent;color:var(--teal);border:1.5px solid var(--teal);}.btn-ghost:hover{background:var(--teal-l);}
.btn-white{background:var(--card);color:var(--text);border:1.5px solid var(--border);}.btn-white:hover{border-color:var(--teal);color:var(--teal);}
.btn-red{background:var(--red);color:#fff;}
.btn-green{background:var(--green);color:#fff;}
.btn-sm{padding:6px 13px;font-size:12px;}
.btn-full{width:100%;justify-content:center;}

/* ── APP SHELL ── */
#app{display:none;min-height:100vh;}
#app.show{display:flex;}

/* Sidebar */
.sidebar{width:var(--sidebar-w);background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;min-height:100vh;position:fixed;top:0;left:0;z-index:100;}
.sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--sunrise);}
.sidebar-logo{padding:20px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.07);}
.sidebar-logo-icon{width:38px;height:38px;flex-shrink:0;}
.sidebar-logo-icon img{width:100%;height:100%;object-fit:contain;}
.sidebar-logo-text{color:#fff;font-size:13.5px;font-weight:700;line-height:1.2;}
.sidebar-logo-sub{color:rgba(255,255,255,.45);font-size:10px;font-weight:400;}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto;}
.nav-section{padding:14px 18px 6px;font-size:10px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.8px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 18px;color:rgba(255,255,255,.65);cursor:pointer;transition:all .15s;border-left:3px solid transparent;font-size:13.5px;font-weight:500;}
.nav-item:hover{background:var(--sidebar-hover);color:#fff;}
.nav-item.active{background:rgba(217,160,42,.16);border-left-color:var(--sidebar-active);color:#fff;font-weight:600;}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
.nav-badge{margin-left:auto;background:var(--teal);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;}
.sidebar-footer{padding:14px 18px;border-top:1px solid rgba(255,255,255,.07);}
.sidebar-user{display:flex;align-items:center;gap:10px;}
.sidebar-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(180deg,#E0AC3E,#C6931E);display:flex;align-items:center;justify-content:center;color:#2A1D0C;font-size:13px;font-weight:700;flex-shrink:0;}
.sidebar-user-info{flex:1;min-width:0;}
.sidebar-user-name{color:#fff;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sidebar-user-role{color:rgba(255,255,255,.4);font-size:11px;}
.sidebar-signout{color:rgba(255,255,255,.4);cursor:pointer;font-size:13px;padding:4px;border-radius:4px;background:none;border:none;}
.sidebar-signout:hover{color:#fff;}

/* Main */
.main-wrap{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50;}
.topbar-title{font-size:18px;font-weight:700;color:var(--text);}
.topbar-search{flex:1;max-width:380px;display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);padding:7px 13px;}
.topbar-search input{border:none;background:none;outline:none;font-size:13px;flex:1;font-family:inherit;color:var(--text);}
.topbar-actions{margin-left:auto;display:flex;gap:8px;align-items:center;}
.topbar-notif{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;color:var(--muted);background:var(--bg);border:1.5px solid var(--border);position:relative;}
.notif-dot{position:absolute;top:6px;right:7px;width:7px;height:7px;background:var(--red);border-radius:50%;}
.topbar-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(180deg,#E0AC3E,#C6931E);display:flex;align-items:center;justify-content:center;color:#2A1D0C;font-size:13px;font-weight:700;cursor:pointer;}

/* ── DROPDOWNS (notifications / profile) ── */
.dropdown-anchor{position:relative;}
.dropdown-panel{position:absolute;top:46px;right:0;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-md);width:300px;display:none;z-index:200;overflow:hidden;}
.dropdown-panel.show{display:block;}
.dropdown-head{padding:13px 16px;border-bottom:1px solid var(--border);font-weight:700;font-size:13px;}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--border);font-size:12.5px;display:flex;gap:10px;align-items:flex-start;}
.notif-item:last-child{border-bottom:none;}
.notif-icon{font-size:16px;flex-shrink:0;}
.notif-empty{padding:26px 16px;text-align:center;color:var(--muted);font-size:13px;}
.profile-dropdown{position:absolute;top:46px;right:0;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-md);width:220px;display:none;z-index:200;overflow:hidden;}
.profile-dropdown.show{display:block;}
.profile-dd-head{padding:16px;border-bottom:1px solid var(--border);}
.profile-dd-name{font-weight:700;font-size:13.5px;}
.profile-dd-email{font-size:11.5px;color:var(--muted);margin-top:2px;word-break:break-all;}
.profile-dd-item{padding:11px 16px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--text);}
.profile-dd-item:hover{background:var(--bg);}

/* Content */
.content{padding:28px;flex:1;}

/* ── DASHBOARD ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.kpi-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);display:flex;align-items:center;gap:16px;}
.kpi-icon{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.kpi-val{font-size:28px;font-weight:800;line-height:1;}
.kpi-lbl{font-size:12px;color:var(--muted);margin-top:3px;}
.kpi-trend{font-size:11px;margin-top:4px;font-weight:600;}

.dash-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;}
.fw-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.fw-card-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.fw-card-title{font-size:14px;font-weight:700;}
.fw-card-body{padding:0;}

/* ── TICKET TABLE ── */
.ticket-table{width:100%;border-collapse:collapse;}
.ticket-table th{background:#fafbfc;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:10px 16px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
.ticket-table td{padding:13px 16px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
.ticket-table tr:last-child td{border-bottom:none;}
.ticket-row{cursor:pointer;transition:background .1s;}
.ticket-row:hover td{background:var(--teal-xl);}
.priority-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.p-high{background:var(--red);}
.p-medium{background:var(--orange);}
.p-low{background:var(--green);}
.ticket-subject{font-weight:600;color:var(--text);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ticket-id{font-size:11px;color:var(--muted);margin-top:2px;}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
.b-open{background:#ebf8ff;color:#2b6cb0;}
.b-pending{background:#fffbeb;color:#92400e;}
.b-resolved{background:#f0fff4;color:#276749;}
.b-closed{background:#f7fafc;color:#4a5568;}
.b-high{background:#fff5f5;color:#c53030;}
.b-medium{background:#fffaf0;color:#c05621;}
.b-low{background:#f0fff4;color:#276749;}
.b-staff{background:#faf5ff;color:#6b46c1;}
.b-participant{background:#fff7ed;color:#c2410c;}

/* ── INBOX ── */
.inbox-toolbar{padding:14px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:var(--card);flex-wrap:wrap;}
.fw-select{border:1.5px solid var(--border);border-radius:var(--radius);padding:7px 12px;font-size:13px;background:var(--card);font-family:inherit;cursor:pointer;color:var(--text);}
.fw-select:focus{outline:none;border-color:var(--teal);}
.search-row{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);padding:7px 12px;flex:1;min-width:180px;}
.search-row input{border:none;background:none;outline:none;font-size:13px;flex:1;font-family:inherit;}
.inbox-wrap{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.inbox-empty{text-align:center;padding:60px;color:var(--muted);}
.inbox-empty-icon{font-size:44px;margin-bottom:12px;}

/* ── TICKET DETAIL SPLIT VIEW ── */
.ticket-detail-wrap{display:grid;grid-template-columns:1fr 300px;gap:20px;}
.ticket-main{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);}
.ticket-head{padding:20px 24px;border-bottom:1px solid var(--border);}
.ticket-head-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;}
.ticket-subject-lg{font-size:18px;font-weight:700;}
.ticket-meta-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.ticket-body{padding:24px;}
.ticket-desc{background:var(--bg);border-radius:var(--radius);padding:16px;font-size:14px;line-height:1.7;margin-bottom:20px;}
.note-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.note{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.note.internal{border-left:3px solid var(--teal);}
.note-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.note-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(180deg,#E0AC3E,#C6931E);display:flex;align-items:center;justify-content:center;color:#2A1D0C;font-size:11px;font-weight:700;flex-shrink:0;}
.note-author{font-size:13px;font-weight:600;}
.note-time{font-size:11px;color:var(--muted);}
.note-type{font-size:10px;background:var(--teal-l);color:var(--teal-d);padding:1px 7px;border-radius:10px;font-weight:700;}
.note-text{font-size:13px;line-height:1.6;color:var(--text);}
.reply-box{border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.reply-toolbar{padding:8px 12px;background:var(--bg);border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--muted);}
.reply-input{width:100%;border:none;padding:12px;font-size:13px;font-family:inherit;resize:none;height:90px;outline:none;color:var(--text);}
.reply-footer{padding:10px 12px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}

/* Properties panel */
.ticket-props{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:0;overflow:hidden;}
.props-head{padding:14px 18px;border-bottom:1px solid var(--border);font-size:13px;font-weight:700;}
.prop-row{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:4px;}
.prop-row:last-child{border-bottom:none;}
.prop-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.prop-val{font-size:13px;}
.prop-select{width:100%;border:1.5px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;font-family:inherit;color:var(--text);background:var(--card);}
.prop-select:focus{outline:none;border-color:var(--teal);}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.fw-modal{background:var(--card);width:580px;max-width:95vw;max-height:90vh;display:flex;flex-direction:column;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.fw-modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.fw-modal-title{font-size:17px;font-weight:700;}
.fw-modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);line-height:1;padding:4px 6px;border-radius:4px;}
.fw-modal-close:hover{background:var(--bg);}
.fw-modal-body{padding:22px 24px;overflow-y:auto;flex:1;}
.fw-modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
.field input,.field select,.field textarea{width:100%;border:1.5px solid var(--border);border-radius:var(--radius);padding:9px 12px;font-size:14px;font-family:inherit;color:var(--text);}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--teal);}

/* ── PAGES ── */
.page-header{margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;}
.page-title{font-size:20px;font-weight:700;}
.page-sub{font-size:13px;color:var(--muted);margin-top:3px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.info-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;}
.info-card-icon{font-size:30px;margin-bottom:10px;}
.info-card-title{font-size:14px;font-weight:700;margin-bottom:6px;}
.info-card-desc{font-size:12px;color:var(--muted);line-height:1.5;}
.alert-item{display:flex;gap:14px;padding:16px;border-radius:var(--radius);margin-bottom:12px;}
.alert-item.info{background:#ebf8ff;border:1px solid #bee3f8;}
.alert-item.warn{background:#fffbeb;border:1px solid #faf089;}
.alert-item.danger{background:#fff5f5;border:1px solid #fed7d7;}
.alert-icon{font-size:20px;flex-shrink:0;}
.alert-title{font-size:13px;font-weight:700;margin-bottom:3px;}
.alert-body{font-size:12px;color:var(--muted);line-height:1.5;}
.faq-item{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden;}
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;cursor:pointer;font-size:14px;font-weight:500;}
.faq-q:hover{background:var(--teal-xl);}
.faq-chevron{color:var(--muted);transition:transform .2s;}
.faq-item.open .faq-chevron{transform:rotate(180deg);}
.faq-a{display:none;padding:0 18px 15px;font-size:13px;color:var(--muted);line-height:1.6;}
.faq-item.open .faq-a{display:block;}
.team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.team-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;text-align:center;}
.team-av{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;margin:0 auto 10px;}
.team-name{font-size:13px;font-weight:700;}
.team-role{font-size:11px;color:var(--muted);margin-top:2px;}
.device-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;}
.device-icon{font-size:32px;margin-bottom:10px;}
.device-name{font-weight:700;font-size:14px;margin-bottom:4px;}
.status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;}
.doc-row{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--border);background:var(--card);}
.doc-row:last-child{border-bottom:none;}
.doc-icon{font-size:22px;flex-shrink:0;}
.doc-name{font-size:13px;font-weight:600;flex:1;}
.doc-meta{font-size:11px;color:var(--muted);}
.access-denied{text-align:center;padding:80px 40px;}
.access-denied .lock{font-size:56px;margin-bottom:16px;}
.access-denied h2{font-size:22px;font-weight:700;margin-bottom:8px;}
.access-denied p{font-size:14px;color:var(--muted);line-height:1.6;}
</style>
</head>

<!-- NEW TICKET MODAL -->
<div class="overlay" id="new-modal">
  <div class="fw-modal">
    <div class="fw-modal-head"><div class="fw-modal-title">🎫 New Support Ticket</div><button class="fw-modal-close" onclick="closeNewModal()">✕</button></div>
    <div class="fw-modal-body">
      <div id="nm-onbehalf-wrap" style="display:none">
        <div style="background:var(--teal-xl);border:1px solid var(--teal-l);border-radius:var(--radius);padding:12px 14px;margin-bottom:16px">
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:0">
            <input type="checkbox" id="nm-onbehalf" onchange="toggleOnBehalf()"> Submit this ticket on behalf of someone else
          </label>
          <div id="nm-onbehalf-fields" style="display:none;margin-top:12px;grid-template-columns:1fr 1fr;gap:14px">
            <div class="field" style="margin-bottom:0"><label>Requester Name</label><input type="text" id="nm-req-name" placeholder="Full name"></div>
            <div class="field" style="margin-bottom:0"><label>Requester Email</label><input type="email" id="nm-req-email" placeholder="their@email.com"></div>
          </div>
        </div>
      </div>
      <div class="field"><label>Subject</label><input type="text" id="nm-subj" placeholder="Briefly describe the issue"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="field"><label>Category</label><select id="nm-cat"><option>IT / Technical Issue</option><option>Program Support</option><option>Case Management</option><option>Employment / Job Search</option><option>Benefits / Resources</option><option>Training / Digital Literacy</option><option>Other</option></select></div>
        <div class="field"><label>Priority</label><select id="nm-pri"><option value="Low">🟢 Low</option><option value="Medium" selected>🟡 Medium</option><option value="High">🔴 High</option></select></div>
      </div>
      <div class="field"><label>Description</label><textarea id="nm-desc" style="height:120px;resize:vertical" placeholder="Provide as much detail as possible…"></textarea></div>
      <div class="field">
        <label>Attach a screenshot (optional)</label>
        <input type="file" id="nm-file" accept="image/*" onchange="handleAttachmentChange()">
        <div id="nm-file-preview" style="margin-top:8px;display:none">
          <img id="nm-file-thumb" style="max-width:120px;max-height:120px;border-radius:6px;border:1px solid var(--border)">
          <button type="button" class="btn btn-white btn-sm" style="margin-left:8px" onclick="clearAttachment()">Remove</button>
        </div>
        <div id="nm-file-status" style="font-size:11.5px;color:var(--muted);margin-top:4px"></div>
      </div>
    </div>
    <div class="fw-modal-foot"><button class="btn btn-white" onclick="closeNewModal()">Cancel</button><button class="btn btn-teal" onclick="submitTicket()">Submit Ticket</button></div>
  </div>
</div>

let db = null;
function dbConfigured(){ return !FIREBASE_CFG.apiKey.startsWith('YOUR_'); }
if(typeof firebase !== 'undefined' && dbConfigured()){
  firebase.initializeApp(FIREBASE_CFG);
  db = firebase.firestore();
}

let unsubscribeTickets = null;
function attachTicketsListener(){
  if(!db) return;
  if(unsubscribeTickets) unsubscribeTickets();
  unsubscribeTickets = db.collection('tickets').orderBy('num','desc').onSnapshot(snap => {
    tickets = snap.docs.map(d => ({...d.data(), id: '#'+d.id}));
    buildSidebar();
    goto(currentPage);
    if(activeTicket && document.getElementById('detail-modal').classList.contains('show')){
      const stillExists = tickets.find(x=>x.id===activeTicket.id);
      if(stillExists) openDetail(activeTicket.id); else closeDetail();
    }
  }, err => console.error('Ticket sync error:', err));
}

// Atomically grab the next ticket number so simultaneous submissions never collide.
async function nextTicketNum(){
  const counterRef = db.collection('meta').doc('counters');
  return db.runTransaction(async tx => {
    const snap = await tx.get(counterRef);
    const next = (snap.exists ? snap.data().nextId : 1000) + 1;
    tx.set(counterRef, {nextId: next}, {merge:true});
    return next;
  });
}

bleshooting:\\n\\nCheck Touchpad Settings:\\nEnsure the touchpad is enabled in the settings. Press Windows + I to open Settings, go to Devices > Touchpad, and make sure the touchpad is turned on1.\\nUpdate or Roll Back Drivers:\\nOpen Device Manager (Windows + X > Device Manager), expand Mice and other pointing devices, right-click the touchpad driver, and select Update driver. If the issue persists, try rolling back the driver1.\\nCheck for Malware:\\nRun a full system scan using a reliable anti-malware tool to ensure all malware is removed2.\\nSound Troubleshooting:\\n\\nCheck Audio Settings:\\nRight-click the sound icon in the taskbar, select Open Sound settings, and ensure the correct output device is selected3.\\nUpdate or Reinstall Audio Drivers:\\nIn Device Manager, expand Sound, video and game controllers, right-click the audio device, and select Update driver. If updating doesn't work, try uninstalling and then reinstalling the driver4.\\nRun Audio Troubleshooter:\\nGo to Settings > Update & Security > Troubleshoot > Additional troubleshooters, and run the Playing Audio troubleshooter4.\\nNext Steps:\\n\\nIf the above steps do not resolve the issues, please escalate to the IT department for further diagnosis and potential hardware inspection.\\nAdditional Notes:\\n\\nEnsure all system updates are installed.\\nConsider restoring the system to a point before the malware attack if possible.\\nStatus:\\n\\nPending further action from IT department.\",\"cat\":\"IT / Technical Issue\",\"pri\":\"High\",\"status\":\"Resolved\",\"req\":\"James Henry Jones Jr.\",\"rtype\":\"staff\",\"agent\":\"Charles Vheru\",\"created\":\"4/15/2025\",\"updated\":\"4/15/2025\",\"notes\":[],\"email\":\"\"},{\"subj\":\"Unwanted browser app pops up on my computer.\",\"desc\":\"Unwanted browser app pops up on my computer. Please Help me?!\",\"cat\":\"IT / Technical Issue\",\"pri\":\"High\",\"status\":\"Resolved\",\"req\":\"Frontdesk\",\"rtype\":\"participant\",\"agent\":\"Charles Vheru\" async function importLegacyTickets(){
  if(!db){ alert('Shared database is not connected — cannot import.'); return; }
  const btn = document.getElementById('import-legacy-btn');
  const flagRef = db.collection('meta').doc('legacyImport');
  let flagSnap;
  try{
    flagSnap = await flagRef.get();
  }catch(err){
    alert('Could not check import status: ' + err.message);
    return;
  }
  if(flagSnap.exists && flagSnap.data().done){
    alert(`Legacy tickets were already imported (${flagSnap.data().count} tickets, on ${flagSnap.data().importedAt}). Skipping to avoid duplicates.`);
    return;
  }
  if(!confirm(`Import ${LEGACY_TICKETS.length} legacy tickets from SharePoint into the shared database?\n\nThis can only be run once — old ticket status/agent/priority will be preserved, but no emails will be sent for these.`)) return;

  if(btn){ btn.disabled = true; }
  let importedCount = 0;
  for(const base of LEGACY_TICKETS){
    if(btn){ btn.textContent = `Importing ${importedCount+1}/${LEGACY_TICKETS.length}…`; }
    try{
      await ensureFirebaseAuthed();
      const num = await nextTicketNum();
      await db.collection('tickets').doc(String(num)).set({...base, num});
      importedCount++;
    }catch(err){
      console.error('Failed to import ticket:', base.subj, err);
    }
  }
  try{
    await flagRef.set({done:true, count:importedCount, importedAt:new Date().toLocaleDateString()});
  }catch(err){
    console.error('Could not write import flag:', err);
  }
  if(btn){ btn.disabled = false; btn.textContent = '📥 Import Legacy Tickets'; }
  toast(`✅ Imported ${importedCount} of ${LEGACY_TICKETS.length} legacy tickets.`);
}

function loginUser(name, email) {
  const isAdmin = CONFIG.ADMIN_EMAILS.map(e=>e.toLowerCase()).includes(email.toLowerCase());
  user = { name, email, isAdmin };
  const ini = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('sb-av').textContent = ini;
  document.getElementById('tb-av').textContent = ini;

  document.getElementById('notif-dot').style.display = NOTIFICATIONS.length ? 'block' : 'none';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('show');

    attachTicketsListener();

  goto('dashboard');
}
function ensureFirebaseAuthed(){
  if(!db || typeof firebase === 'undefined') return Promise.resolve();
  if(firebase.auth().currentUser) return Promise.resolve();
  return firebase.auth().signInAnonymously();
}
function doLogout(){
  user = null;
  if(unsubscribeTickets){ unsubscribeTickets(); unsubscribeTickets = null; }
  tickets = [];
  if(db && typeof firebase !== 'undefined' && firebase.auth().currentUser){
    firebase.auth().signOut().catch(()=>{});
  }
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').classList.remove('show');
  document.getElementById('login-err').style.display = 'none';
  closeNotifPanel();
  closeProfilePanel();
}
function showErr(msg){ const e=document.getElementById('login-err'); e.textContent=msg; e.style.display='block'; }

function buildSidebar() {
  const openCount = tickets.filter(t=>t.status==='Open').length;
  const items = [
    {id:'dashboard', icon:'📊', label:'Dashboard'},
    {id:'inbox', icon:'📥', label:'All Tickets', badge: openCount},
    ...(user.isAdmin ? [{id:'my-tickets', icon:'📌', label:'My Assigned'}] : []),
    {id:'new-ticket', icon:'➕', label:'New Ticket'},
    ...(user.isAdmin ? [{id:'analytics', icon:'📈', label:'Analytics'}] : []),
  ];
  document.getElementById('sidebar-nav').innerHTML = items.map(item => {
    if(item.section) return `<div class="nav-section">${item.section}</div>`;
    return `<div class="nav-item" id="nav-${item.id}" onclick="goto('${item.id}')">
      <span class="nav-icon">${item.icon}</span>${item.label}
      ${item.badge ? `<span class="nav-badge">${item.badge}</span>` : ''}
    </div>`;
  }).join('');
}

function goto(p) {
  if((p==='inbox'||p==='my-tickets'||p==='analytics') && !user.isAdmin) { renderAccessDenied(); return; }
  currentPage = p;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const ni = document.getElementById('nav-'+p);
  if(ni) ni.classList.add('active');
  const titles = {dashboard:'Dashboard',inbox:'All Tickets','my-tickets':'My Assigned Tickets','new-ticket':'New Ticket',analytics:'Analytics'};
  document.getElementById('tb-title').textContent = titles[p]||p;
  const c = document.getElementById('content');
  switch(p) {
    case 'dashboard':   c.innerHTML = renderDashboard(); break;
    case 'inbox':       c.innerHTML = renderInbox(tickets); bindRows(); break;
    case 'my-tickets':  c.innerHTML = renderInbox(tickets.filter(t=>t.agent===user.name.split(' ')[0]+' '+user.name.split(' ').slice(1).join(' '))); bindRows(); break;
    case 'new-ticket':  openNewModal(); goto('dashboard'); break;
    case 'analytics':   c.innerHTML = renderAnalytics(); break;
    default: c.innerHTML = '<div style="padding:40px;color:var(--muted)">Coming soon.</div>';
  }
}

function onGlobalSearch() {
  const q = document.getElementById('global-search').value.trim();
  if(!q) return;
  currentPage = 'inbox';
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const ni=document.getElementById('nav-inbox'); if(ni)ni.classList.add('active');
  document.getElementById('tb-title').textContent = `Search: "${q}"`;
  const f = tickets.filter(t=>t.subj.toLowerCase().includes(q.toLowerCase())||t.req.toLowerCase().includes(q.toLowerCase())||t.id.includes(q));
  document.getElementById('content').innerHTML = renderInbox(f);
  bindRows();
}

function barBreakdown(counts){
  const entries = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const max = Math.max(1, ...entries.map(e=>e[1]));
  return entries.map(([label,count])=>`
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px">
        <span>${label}</span><span style="color:var(--muted);font-weight:600">${count}</span>
      </div>
      <div style="background:var(--bg);border-radius:6px;height:8px;overflow:hidden">
        <div style="width:${(count/max*100).toFixed(0)}%;height:100%;background:linear-gradient(90deg,#E0AC3E,#C6931E);border-radius:6px"></div>
      </div>
    </div>`).join('') || '<p style="color:var(--muted);font-size:13px">No data yet.</p>';
}

function renderAnalytics(){
  const total = tickets.length;
  const byCategory = {}, byPriority = {}, byStatus = {};
  tickets.forEach(t=>{
    byCategory[t.cat] = (byCategory[t.cat]||0)+1;
    byPriority[t.pri] = (byPriority[t.pri]||0)+1;
    byStatus[t.status] = (byStatus[t.status]||0)+1;
  });

  const resolvedWithTimes = tickets.filter(t=>t.createdAt && t.resolvedAt);
  const avgResolveDays = resolvedWithTimes.length
    ? (resolvedWithTimes.reduce((sum,t)=>sum+(t.resolvedAt-t.createdAt),0) / resolvedWithTimes.length / 86400000).toFixed(1)
    : null;

  const sevenDaysAgo = Date.now() - 7*86400000;
  const last7Days = tickets.filter(t=>t.createdAt && t.createdAt >= sevenDaysAgo).length;

  const agingCount = tickets.filter(t=>{
    const age = ticketAgeDays(t);
    return age!==null && age>=3 && (t.status==='Open'||t.status==='Pending');
  }).length;

  return `
  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-icon" style="background:var(--teal-xl)">🎫</div><div><div class="kpi-val">${total}</div><div class="kpi-lbl">Total Tickets</div></div></div>
    <div class="kpi-card"><div class="kpi-icon" style="background:#f0fff4">⏱️</div><div><div class="kpi-val" style="color:var(--green)">${avgResolveDays!==null?avgResolveDays+'d':'—'}</div><div class="kpi-lbl">Avg. Resolution Time</div></div></div>
    <div class="kpi-card"><div class="kpi-icon" style="background:#ebf8ff">📅</div><div><div class="kpi-val" style="color:var(--blue)">${last7Days}</div><div class="kpi-lbl">Created Last 7 Days</div></div></div>
    <div class="kpi-card"><div class="kpi-icon" style="background:#fff5f5">⏰</div><div><div class="kpi-val" style="color:var(--red)">${agingCount}</div><div class="kpi-lbl">Aging (3+ days open)</div></div></div>
  </div>
  <div class="dash-grid">
    <div class="fw-card">
      <div class="fw-card-head"><span class="fw-card-title">Tickets by Category</span></div>
      <div style="padding:16px 18px">${barBreakdown(byCategory)}</div>
    </div>
    <div class="fw-card">
      <div class="fw-card-head"><span class="fw-card-title">Tickets by Priority</span></div>
      <div style="padding:16px 18px">${barBreakdown(byPriority)}</div>
    </div>
  </div>
  <div class="dash-grid">
    <div class="fw-card">
      <div class="fw-card-head"><span class="fw-card-title">Tickets by Status</span></div>
      <div style="padding:16px 18px">${barBreakdown(byStatus)}</div>
    </div>
    <div class="fw-card">
      <div class="fw-card-head"><span class="fw-card-title">Export</span></div>
      <div style="padding:18px;display:flex;flex-direction:column;gap:10px">
        <p style="font-size:13px;color:var(--muted)">Download every ticket currently in the system as a spreadsheet-ready CSV file.</p>
        <button class="btn btn-teal btn-full" onclick="exportTicketsCSV()">⬇️ Export All Tickets to CSV</button>
      </div>
    </div>
  </div>`;
}

function ticketAgeDays(t){
  if(!t.createdAt) return null;
  return Math.floor((Date.now() - t.createdAt) / 86400000);
}

function ticketRows(list) {
  if(!list.length) return `<tr><td colspan="9"><div class="inbox-empty"><div class="inbox-empty-icon">📭</div><p style="color:var(--muted)">No tickets found</p></div></td></tr>`;
  return list.map(t=>{
    const age = ticketAgeDays(t);
    const isAging = age!==null && age>=3 && (t.status==='Open'||t.status==='Pending');
    return `
    <tr class="ticket-row" data-id="${t.id}">
      <td style="padding-left:16px"><input type="checkbox" class="row-select-cb" data-id="${t.id}" onclick="event.stopPropagation()" onchange="toggleRowSelect('${t.id}', this.checked)"></td>
      <td><div class="priority-dot p-${t.pri.toLowerCase()}"></div></td>
      <td><div class="ticket-subject">${t.subj}${t.attachment?' 📎':''}</div><div class="ticket-id">${t.id}</div></td>
      <td style="font-size:13px">${t.req}<br><span class="badge b-${t.rtype}" style="margin-top:3px">${t.rtype}</span></td>
      <td style="font-size:12px;color:var(--muted)">${t.cat}</td>
      <td><span class="badge b-${t.pri.toLowerCase()}">${t.pri}</span></td>
      <td><span class="badge ${sbadge(t.status)}">${t.status}</span></td>
      <td style="font-size:12px;color:var(--muted)">${t.agent}</td>
      <td style="font-size:12px;color:var(--muted);white-space:nowrap">${t.updated}${isAging?`<div style="color:var(--red);font-weight:600;margin-top:2px">⏰ ${age}d open</div>`:''}</td>
    </tr>`;
  }).join('');
}

function toggleSelectAll(checked){
  document.querySelectorAll('.row-select-cb').forEach(cb=>{
    cb.checked = checked;
    if(checked) selectedTickets.add(cb.dataset.id); else selectedTickets.delete(cb.dataset.id);
  });
  updateBulkToolbar();
}
function toggleRowSelect(id, checked){
  if(checked) selectedTickets.add(id); else selectedTickets.delete(id);
  updateBulkToolbar();
}
function updateBulkToolbar(){
  const bar = document.getElementById('bulk-toolbar');
  const count = document.getElementById('bulk-count');
  if(!bar) return;
  if(selectedTickets.size>0){
    bar.style.display='flex';
    count.textContent = `${selectedTickets.size} selected`;
  } else {
    bar.style.display='none';
  }
}
function clearSelection(){
  selectedTickets.clear();
  document.querySelectorAll('.row-select-cb').forEach(cb=>cb.checked=false);
  const selAll=document.getElementById('select-all-cb'); if(selAll) selAll.checked=false;
  updateBulkToolbar();
}
function bulkSetStatus(status){
  if(!selectedTickets.size) return;
  if(!confirm(`Mark ${selectedTickets.size} ticket(s) as ${status}?`)) return;
  selectedTickets.forEach(id => setProp(id, 'status', status));
  clearSelection();
  toast(`Updated ${selectedTickets.size} ticket(s).`);
}
function bulkAssign(agent){
  if(!agent || !selectedTickets.size) return;
  const ids=[...selectedTickets];
  ids.forEach(id => setProp(id, 'agent', agent));
  clearSelection();
  toast(`Assigned ${ids.length} ticket(s) to ${agent}.`);
}
function bulkDelete(){
  if(!selectedTickets.size) return;
  if(!confirm(`Delete ${selectedTickets.size} ticket(s)? This cannot be undone.`)) return;
  const ids=[...selectedTickets];
  ids.forEach(id=>{
    const numId = id.replace('#','');
    if(db){ db.collection('tickets').doc(numId).delete().catch(err=>console.error('Delete failed:',err)); }
    else { tickets = tickets.filter(x=>x.id!==id); }
  });
  clearSelection();
  if(!db){ buildSidebar(); goto(currentPage); }
  toast(`Deleted ${ids.length} ticket(s).`);
}

function exportTicketsCSV(){
  const rows = [['Ticket ID','Subject','Category','Priority','Status','Requester','Requester Email','Agent','Created','Updated','Description']];
  tickets.forEach(t=>{
    rows.push([t.id,t.subj,t.cat,t.pri,t.status,t.req,t.email||'',t.agent,t.created,t.updated,(t.desc||'').replace(/\n/g,' ')]);
  });
  const csv = rows.map(r=>r.map(cell=>`"${String(cell).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ptw-helpdesk-tickets-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function filterInbox() {
  const q=(document.getElementById('inbox-q')?.value||'').toLowerCase();
  const st=document.getElementById('f-status')?.value||'';
  const pr=document.getElementById('f-pri')?.value||'';
  const ty=document.getElementById('f-type')?.value||'';
  const base = currentPage==='my-tickets' ? tickets.filter(t=>t.agent.includes(user.name.split(' ')[0])) : tickets;
  const f=base.filter(t=>
    (!q||t.subj.toLowerCase().includes(q)||t.id.includes(q)||t.req.toLowerCase().includes(q))&&
    (!st||t.status===st)&&(!pr||t.pri===pr)&&(!ty||t.rtype===ty)
  );
  const body=document.getElementById('inbox-rows');
  if(body){body.innerHTML=ticketRows(f);bindRows();}
  clearSelection();
}

function prop(label,val){return `<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">${label}</div><div style="font-size:13px">${val}</div></div>`;}

function setProp(id,key,val){
  const numId = id.replace('#','');
  const t=tickets.find(x=>x.id===id);
  if(!t) return;
  const extra = {};
  if(key==='status' && val==='Resolved') extra.resolvedAt = Date.now();
  if(db){
    db.collection('tickets').doc(numId).update({[key]:val, updated:'Today', ...extra}).catch(err=>console.error('Update failed:',err));
  } else {
    t[key]=val; t.updated='Today';
    Object.assign(t, extra);
    goto(currentPage);
  }
}

function deleteTicket(id){
  const t=tickets.find(x=>x.id===id);
  if(!t)return;
  if(!confirm(`Delete ticket ${t.id} — "${t.subj}"? This cannot be undone.`))return;
  const numId = id.replace('#','');
  if(db){
    db.collection('tickets').doc(numId).delete().catch(err=>console.error('Delete failed:',err));
    closeDetail();
    toast(`🗑️ Ticket ${id} deleted.`);
  } else {
    tickets=tickets.filter(x=>x.id!==id);
    closeDetail();
    buildSidebar();
    toast(`🗑️ Ticket ${id} deleted.`);
    goto(currentPage==='new-ticket' ? 'dashboard' : currentPage);
  }
}

function addNote(){
  const txt=document.getElementById('dm-note-input').value.trim();
  if(!txt||!activeTicket)return;
  const now=new Date();
  const note={author:user.name,time:'Today · '+now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),text:txt,internal:true};
  const numId = activeTicket.id.replace('#','');
  if(db){
    db.collection('tickets').doc(numId).update({
      notes: firebase.firestore.FieldValue.arrayUnion(note),
      updated: 'Today'
    }).catch(err=>console.error('Note failed:',err));
  } else {
    activeTicket.notes.push(note);
    activeTicket.updated='Today';
    openDetail(activeTicket.id);
  }
}

let pendingAttachment = null;

function handleAttachmentChange(){
  const input = document.getElementById('nm-file');
  const file = input.files[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){
    alert('Only image files can be attached.');
    input.value='';
    return;
  }
  const statusEl = document.getElementById('nm-file-status');
  statusEl.textContent = 'Processing image…';

  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      // Resize down so the stored attachment stays well under Firestore's 1MB doc limit
      const MAX_DIM = 900;
      let w = img.width, h = img.height;
      if(w > MAX_DIM || h > MAX_DIM){
        const scale = MAX_DIM / Math.max(w,h);
        w = Math.round(w*scale); h = Math.round(h*scale);
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.72);

      if(dataUrl.length > 700000){
        alert('That image is too large even after compression — please try a smaller screenshot.');
        clearAttachment();
        return;
      }

      pendingAttachment = { name: file.name, dataUrl };
      document.getElementById('nm-file-thumb').src = dataUrl;
      document.getElementById('nm-file-preview').style.display = 'block';
      statusEl.textContent = `${file.name} (${Math.round(dataUrl.length/1024)} KB)`;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function clearAttachment(){
  pendingAttachment = null;
  document.getElementById('nm-file').value = '';
  document.getElementById('nm-file-preview').style.display = 'none';
  document.getElementById('nm-file-status').textContent = '';
}

async function submitTicket(){
  const subj=document.getElementById('nm-subj').value.trim(),desc=document.getElementById('nm-desc').value.trim();
  if(!subj||!desc){alert('Please fill in Subject and Description.');return;}

  const onBehalf = user.isAdmin && document.getElementById('nm-onbehalf').checked;
  let reqName = user.name, reqEmail = user.email;
  if(onBehalf){
    const n=document.getElementById('nm-req-name').value.trim();
    const e=document.getElementById('nm-req-email').value.trim();
    if(!n||!e){alert('Please enter the requester\'s name and email.');return;}
    reqName = n; reqEmail = e;
  }

  const now = Date.now();
  const base = {subj,cat:document.getElementById('nm-cat').value,pri:document.getElementById('nm-pri').value,status:'Open',req:reqName,rtype:user.isAdmin&&!onBehalf?'staff':'participant',agent:'Unassigned',created:'Today',updated:'Today',desc,notes:[],email:reqEmail,createdAt:now,resolvedAt:null,attachment:pendingAttachment};

  let newTicket;
  if(db){
    try{
      await ensureFirebaseAuthed();
      const num = await nextTicketNum();
      newTicket = {...base, num, id:'#'+num};
      await db.collection('tickets').doc(String(num)).set({...base, num});
    }catch(err){
      console.error('Ticket save failed:', err);
      alert('Could not save the ticket — please try again.');
      return;
    }
  } else {
    nextId++;
    newTicket = {...base, id:'#'+nextId};
    tickets.unshift(newTicket);
    buildSidebar();
  }

  closeNewModal();
  ['nm-subj','nm-desc'].forEach(id=>document.getElementById(id).value='');
  toast('🎫 Ticket submitted! Your team will follow up shortly.');
  sendTicketEmails(newTicket);
  goto(user.isAdmin?'inbox':'dashboard');
}

// Static sites can't send email on their own — this uses EmailJS (emailjs.com),
// a client-safe way to trigger email from browser-side code without a backend.
// To activate: create a free EmailJS account, connect an email service, make
// the two templates described, then fill in the values below.
const EMAIL_CFG = {
  PUBLIC_KEY:            'wDqEtFAnOXALF24Lt',
  SERVICE_ID:            'service_w7iew3t',
  TEMPLATE_ID_REQUESTER: 'template_3y36hdz',

function emailConfigured(){

    && !EMAIL_CFG.SERVICE_ID.startsWith('YOUR_')
    && !EMAIL_CFG.TEMPLATE_ID_REQUESTER.startsWith('YOUR_')
    && !EMAIL_CFG.TEMPLATE_ID_ADMIN.startsWith('YOUR_');

function sendTicketEmails(t){
  if(!emailConfigured()){
    console.warn('Email notifications are not configured yet — see EMAIL_CFG in the code. Skipping send for ticket', t.id);
    return;
  }
  if(typeof emailjs === 'undefined'){
    console.error('EmailJS library did not load — check your network/ad-blocker.');

  const params = {

      ...params, to_email: t.email,

    ['How do I submit a support ticket?','Click "+ New Ticket" in the top bar or sidebar at any time to open the ticket submission form.'],
  ];
  return `<div class="page-header"><div class="page-title">Frequently Asked Questions</div></div>${items.map((it,i)=>`<div class="faq-item" id="faq${i}"><div class="faq-q" onclick="tfaq(${i})">${it[0]}<span class="faq-chevron">▾</span></div><div class="faq-a">${it[1]}</div></div>`).join('')}`;
}
function tfaq(i){const el=document.getElementById('faq'+i);if(el)el.classList.toggle('open');}

function renderDocuments(){
  const docs=[{i:'📄',n:'PTW IT Acceptable Use Policy',d:'Jun 1, 2026',s:'PDF · 2.1 MB'},{i:'📄',n:'Return-to-Worksite Safety Guidelines',d:'May 28, 2026',s:'PDF · 890 KB'},{i:'📊',n:'Device Inventory Q2 2026',d:'Jun 15, 2026',s:'XLSX · 145 KB'},{i:'📄',n:'New Employee IT Onboarding Guide',d:'Apr 10, 2026',s:'PDF · 3.4 MB'},{i:'📊',n:'Helpdesk Ticket Report — May 2026',d:'Jun 3, 2026',s:'PDF · 512 KB'},{i:'📄',n:'Microsoft 365 Quick Reference',d:'Mar 5, 2026',s:'PDF · 1.2 MB'}];
  return `<div class="page-header"><div class="page-title">Documents</div></div><div class="fw-card">${docs.map(d=>`<div class="doc-row"><div class="doc-icon">${d.i}</div><div class="doc-name">${d.n}</div><div class="doc-meta">${d.d} · ${d.s}</div><button class="btn btn-white btn-sm" onclick="alert('Requires SharePoint connection.')">Open</button></div>`).join('')}</div>`;
}

function renderAccessDenied(){
  document.getElementById('content').innerHTML=`<div class="access-denied"><div class="lock">🔒</div><h2>Access Restricted</h2><p>The Tickets section is only available to admins.<br>Contact your IT manager to request access.</p></div>`;
}

// ══════ HELPERS ══════
function sbadge(s){return{Open:'b-open',Pending:'b-pending',Resolved:'b-resolved',Closed:'b-closed'}[s]||'b-open';}
function toast(msg){const el=document.createElement('div');el.style.cssText='position:fixed;bottom:24px;right:24px;background:#251C13;color:#fff;padding:13px 20px;border-radius:10px;font-size:13.5px;font-weight:500;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.3);border-left:3px solid #D9A02A';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),3800);}
</script>
